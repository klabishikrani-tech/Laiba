<title>Beautiful House Scene</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f4f8;
    font-family:Arial, sans-serif;
}

.canvas{
    width:700px;
    height:450px;
    position:relative;
    overflow:hidden;
    border:4px solid #444;
    border-radius:10px;
    background:linear-gradient(to top, #87ceeb 70%, #dff6ff);
}

/* Sun */
.sun{
    width:90px;
    height:90px;
    background:#ffd93d;
    border-radius:50%;
    position:absolute;
    top:30px;
    left:40px;
    box-shadow:0 0 30px #ffd93d;
}

/* Clouds */
.cloud{
    width:90px;
    height:50px;
    background:white;
    border-radius:50px;
    position:absolute;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before{
    width:50px;
    height:50px;
    top:-20px;
    left:10px;
}

.cloud::after{
    width:60px;
    height:60px;
    top:-25px;
    right:10px;
}

.cloud1{
    top:50px;
    left:220px;
}

.cloud2{
    top:90px;
    right:100px;
}

/* Ground */
.ground{
    width:100%;
    height:130px;
    background:#4caf50;
    position:absolute;
    bottom:0;
}

/* House */
.house{
    width:180px;
    height:130px;
    background:#f4a261;
    position:absolute;
    bottom:130px;
    left:250px;
    border:3px solid #8d5524;
}

/* Roof */
.roof{
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:90px solid #b22222;
    position:absolute;
    bottom:260px;
    left:230px;
}
